      <h1>案例一</h1>

    <article class="case-article-copy">
      <p>「我自己最極端的減肥經驗就是一天一餐。」目前正在減重的大二學生張皓承說，自己因為體型較大，搭計程車時曾被司機稱作「小胖」。即使類似稱呼已經聽過許多次，每一次仍然會影響他的心情。</p>
      <p>真正讓皓承下定決心減重的契機，是一次手術。術後醫師希望他以較健康的方式調整體重，但因受傷限制，運動對他而言是一項挑戰，因此他先從節食與飲食控管開始。</p>
      <p>「今天想要做運動，我就會去做運動；今天想要節食，就節食。」</p>
      <p>他沒有為減重訂下非常完整的規劃，卻透過健康餐盒、蔬菜與長時間節食等方式減少約十五公斤。他也觀察到，體重下降一段時間後會進入停滯期，屆時可能需要重新調整飲食與活動方式。</p>
    </article>
