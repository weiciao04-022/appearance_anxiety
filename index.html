<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>體態、社群與健康焦慮互動專題</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="opening-video-section" class="section reveal scroll-video-intro" data-video-intro>
    <div class="frame-wrap video-intro-wrap">
      <div class="video-intro-sticky">
        <div class="video-copy-block">
          <p class="section-kicker">互動新聞專題</p>
          <h1>滑動觀看體態焦慮如何被日常內容推進</h1>
          <p>這裡預留滾動式影片敘事素材位置。使用者往下滑時，placeholder 畫面會依序推進，後續可替換成正式影片或連續影格。</p>
        </div>

        <div class="video-placeholder-block" aria-label="滾動式影片 placeholder">
          <div class="video-frame-placeholder" data-video-frame>
            <span>scroll video placeholder</span>
            <strong id="videoFrameLabel">frame 01</strong>
          </div>
          <div class="video-progress-track" aria-hidden="true">
            <span data-video-progress></span>
          </div>
        </div>

        <ol class="video-cue-list" aria-label="影片敘事段落">
          <li class="is-active" data-video-cue>看見社群中的體態訊息</li>
          <li data-video-cue>注意開始被外貌標準牽動</li>
          <li data-video-cue>進入後續互動內容</li>
        </ol>
      </div>
    </div>
  </section>

  <section id="frame-4" class="section reveal">
    <div class="frame-wrap center-col">
      <p class="title">圖表分佈圖</p>
      <p class="subtitle">你的理想身材</p>
      <div class="body-gender-toggle" aria-label="選擇性別">
        <button class="body-gender-button active" data-gender="female" type="button">女生</button>
        <button class="body-gender-button" data-gender="male" type="button">男生</button>
      </div>
      <div class="body-option-grid" id="bodyOptionGrid" aria-live="polite"></div>
      <p id="choiceResult" class="body-choice-result">請先選擇一張圖片</p>
    </div>
  </section>

  <section id="story-1-page" class="section reveal">
    <div class="frame-wrap center-col">
      <p class="title">看看大家的故事</p>
      <div class="case-row">
        <a class="case-card" href="pages/case1.html">案例一</a>
        <a class="case-card" href="pages/case2.html">案例二</a>
        <a class="case-card" href="pages/case3.html">案例三</a>
      </div>
      <p>點選，或是繼續下滑</p>
    </div>
  </section>

  <section id="frame-9" class="section reveal body-method-section">
    <style>
      #frame-9.body-method-section {
        background: #fff;
        color: #000;
      }

      #frame-9 .BodyMethodExplorer {
        width: min(1080px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr);
        gap: 24px;
        align-items: stretch;
      }

      #frame-9 .body-method-heading {
        grid-column: 1 / -1;
        margin: 0;
        color: #000;
        font-size: 1rem;
        font-weight: 400;
      }

      #frame-9 .body-method-card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      #frame-9 .body-method-card,
      #frame-9 .body-method-detail {
        border: 1px solid #000;
        border-radius: 8px;
        background: #fff;
        box-shadow: none;
        box-sizing: border-box;
      }

      #frame-9 .body-method-card {
        min-height: 240px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        color: #000;
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition: transform 0.16s ease, border-width 0.16s ease;
      }

      #frame-9 .body-method-card:hover {
        transform: translateY(-2px);
      }

      #frame-9 .body-method-card.is-active {
        border-width: 2px;
        background: #000;
        color: #fff;
      }

      #frame-9 .body-method-card h3,
      #frame-9 .body-method-detail h3 {
        margin: 0;
        color: inherit;
        font-size: 1.35rem;
        line-height: 1.3;
      }

      #frame-9 .body-method-card p,
      #frame-9 .body-method-detail p {
        margin: 0;
        line-height: 1.6;
      }

      #frame-9 .body-method-image-placeholder {
        min-height: 118px;
        display: grid;
        place-items: center;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: #fff;
        color: inherit;
      }

      #frame-9 .body-method-card.is-active .body-method-image-placeholder {
        background: #000;
      }

      #frame-9 .body-method-card-cta {
        margin-top: auto;
        color: inherit;
      }

      #frame-9 .body-method-detail {
        min-height: 100%;
        padding: 24px;
        display: grid;
        gap: 16px;
        align-content: start;
      }

      #frame-9 .body-method-detail[hidden] {
        display: none;
      }

      #frame-9 .body-method-detail .body-method-image-placeholder {
        min-height: 220px;
      }

      #frame-9 .body-method-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      #frame-9 .body-method-actions .button {
        border: 1px solid #000;
        border-radius: 8px;
        background: #fff;
        color: #000;
        box-shadow: none;
        font-weight: 400;
      }

      #frame-9 .body-method-actions .button:hover {
        transform: translateY(-1px);
      }

      @media (max-width: 900px) {
        #frame-9 .BodyMethodExplorer {
          grid-template-columns: 1fr;
        }

        #frame-9 .body-method-card-grid {
          grid-template-columns: 1fr;
        }

        #frame-9 .body-method-card {
          min-height: 220px;
        }

        #frame-9 .body-method-actions .button {
          width: 100%;
        }
      }
    </style>

    <div class="frame-wrap BodyMethodExplorer" data-body-method-explorer>
      <p class="body-method-heading">體態管理方式入口</p>
      <div class="body-method-card-grid" data-method-card-grid></div>
      <article class="body-method-detail" data-method-detail hidden aria-live="polite">
        <h3 data-method-title></h3>
        <p data-method-subtitle>內容待補</p>
        <div class="body-method-image-placeholder" data-method-image>image placeholder</div>
        <p>這裡之後會放入此方法的介紹、花費、心理壓力與身體感受。</p>
        <div class="body-method-actions">
          <button class="button" type="button" data-method-collapse>收合</button>
          <button class="button" type="button" data-method-next>下一項</button>
        </div>
      </article>
    </div>

    <script>
      (() => {
        const explorer = document.querySelector('[data-body-method-explorer]');
        if (!explorer) return;

        const methods = [
          {
            id: 'meal',
            title: '健康餐',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'gym',
            title: '健身房',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'injection',
            title: '瘦瘦針',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'fasting',
            title: '斷食',
            description: '內容待補',
            imageLabel: 'image placeholder'
          }
        ];

        let selectedMethod = null;
        const cardGrid = explorer.querySelector('[data-method-card-grid]');
        const detail = explorer.querySelector('[data-method-detail]');
        const detailTitle = explorer.querySelector('[data-method-title]');
        const detailSubtitle = explorer.querySelector('[data-method-subtitle]');
        const detailImage = explorer.querySelector('[data-method-image]');
        const collapseButton = explorer.querySelector('[data-method-collapse]');
        const nextButton = explorer.querySelector('[data-method-next]');

        function renderCards() {
          cardGrid.innerHTML = methods.map((method) => `
            <button class="body-method-card" type="button" data-method-id="${method.id}" aria-pressed="false">
              <h3>${method.title}</h3>
              <p>${method.description}</p>
              <div class="body-method-image-placeholder">${method.imageLabel}</div>
              <span class="body-method-card-cta">點擊查看</span>
            </button>
          `).join('');
        }

        function selectMethod(methodId) {
          selectedMethod = methods.find((method) => method.id === methodId) || null;
          explorer.querySelectorAll('[data-method-id]').forEach((card) => {
            const isActive = card.dataset.methodId === selectedMethod?.id;
            card.classList.toggle('is-active', isActive);
            card.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          });

          if (!selectedMethod) {
            detail.hidden = true;
            return;
          }

          detailTitle.textContent = selectedMethod.title;
          detailSubtitle.textContent = selectedMethod.description;
          detailImage.textContent = selectedMethod.imageLabel;
          detail.hidden = false;
        }

        renderCards();

        cardGrid.addEventListener('click', (event) => {
          const card = event.target.closest('[data-method-id]');
          if (!card) return;
          selectMethod(card.dataset.methodId);
        });

        collapseButton.addEventListener('click', () => selectMethod(null));

        nextButton.addEventListener('click', () => {
          const currentIndex = methods.findIndex((method) => method.id === selectedMethod?.id);
          const nextIndex = currentIndex < 0 ? 0 : (currentIndex + 1) % methods.length;
          selectMethod(methods[nextIndex].id);
        });
      })();
    </script>
  </section>

  <script src="script.js"></script>
</body>
</html>
