<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>體態、社群與健康焦慮互動專題</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="opening-video-section" class="section reveal scroll-video-intro" data-video-intro>
    <div class="frame-wrap video-intro-wrap">
      <div class="video-intro-sticky">
        <div class="video-copy-block">
          <p class="section-kicker">互動新聞專題</p>
          <h1>滑動觀看體態焦慮如何被日常內容推進</h1>
          <p>這裡預留滾動式影片敘事素材位置。使用者往下滑時，placeholder 畫面會依序推進，後續可替換成正式影片或連續影格。</p>
        </div>

        <div class="video-placeholder-block" aria-label="滾動式影片 placeholder">
          <div class="video-frame-placeholder" data-video-frame>
            <span>scroll video placeholder</span>
            <strong id="videoFrameLabel">frame 01</strong>
          </div>
          <div class="video-progress-track" aria-hidden="true">
            <span data-video-progress></span>
          </div>
        </div>

        <ol class="video-cue-list" aria-label="影片敘事段落">
          <li class="is-active" data-video-cue>看見社群中的體態訊息</li>
          <li data-video-cue>注意開始被外貌標準牽動</li>
          <li data-video-cue>進入後續互動內容</li>
        </ol>
      </div>
    </div>
  </section>

  <section id="frame-4" class="section reveal">
    <div class="frame-wrap center-col">
      <p class="title">圖表分佈圖</p>
      <p class="subtitle">你的理想身材</p>
      <div class="body-gender-toggle" aria-label="選擇性別">
        <button class="body-gender-button active" data-gender="female" type="button">女生</button>
        <button class="body-gender-button" data-gender="male" type="button">男生</button>
      </div>
      <div class="body-option-grid" id="bodyOptionGrid" aria-live="polite"></div>
      <p id="choiceResult" class="body-choice-result">請先選擇一張圖片</p>
    </div>
  </section>

  <section id="story-1-page" class="section reveal">
    <div class="frame-wrap center-col">
      <p class="title">看看大家的故事</p>
      <div class="case-row">
        <a class="case-card" href="pages/case1.html">案例一</a>
        <a class="case-card" href="pages/case2.html">案例二</a>
        <a class="case-card" href="pages/case3.html">案例三</a>
      </div>
      <p>點選，或是繼續下滑</p>
    </div>
  </section>

  <section id="frame-9" class="section reveal body-method-section">
    <style>
      #frame-9.body-method-section {
        background: #fff;
        color: #000;
      }

      #frame-9 .BodyMethodExplorer {
        width: min(1080px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr);
        gap: 24px;
        align-items: stretch;
      }

      #frame-9 .body-method-heading {
        grid-column: 1 / -1;
        margin: 0;
        color: #000;
        font-size: 1rem;
        font-weight: 400;
      }

      #frame-9 .body-method-card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      #frame-9 .body-method-card,
      #frame-9 .body-method-detail {
        border: 1px solid #000;
        border-radius: 8px;
        background: #fff;
        box-shadow: none;
        box-sizing: border-box;
      }

      #frame-9 .body-method-card {
        min-height: 240px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        color: #000;
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition: transform 0.16s ease, border-width 0.16s ease;
      }

      #frame-9 .body-method-card:hover {
        transform: translateY(-2px);
      }

      #frame-9 .body-method-card.is-active {
        border-width: 2px;
        background: #000;
        color: #fff;
      }

      #frame-9 .body-method-card h3,
      #frame-9 .body-method-detail h3 {
        margin: 0;
        color: inherit;
        font-size: 1.35rem;
        line-height: 1.3;
      }

      #frame-9 .body-method-card p,
      #frame-9 .body-method-detail p {
        margin: 0;
        line-height: 1.6;
      }

      #frame-9 .body-method-image-placeholder {
        min-height: 118px;
        display: grid;
        place-items: center;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: #fff;
        color: inherit;
      }

      #frame-9 .body-method-card.is-active .body-method-image-placeholder {
        background: #000;
      }

      #frame-9 .body-method-card-cta {
        margin-top: auto;
        color: inherit;
      }

      #frame-9 .body-method-detail {
        min-height: 100%;
        padding: 24px;
        display: grid;
        gap: 16px;
        align-content: start;
      }

      #frame-9 .body-method-detail[hidden] {
        display: none;
      }

      #frame-9 .body-method-detail .body-method-image-placeholder {
        min-height: 220px;
      }

      #frame-9 .body-method-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      #frame-9 .body-method-actions .button {
        border: 1px solid #000;
        border-radius: 8px;
        background: #fff;
        color: #000;
        box-shadow: none;
        font-weight: 400;
      }

      #frame-9 .body-method-actions .button:hover {
        transform: translateY(-1px);
      }

      #frame-9 .meal-box-game {
        display: grid;
        gap: 18px;
      }

      #frame-9 .meal-game-intro {
        display: grid;
        gap: 8px;
      }

      #frame-9 .meal-game-intro h3,
      #frame-9 .meal-game-intro p {
        margin: 0;
      }

      #frame-9 .meal-game-intro p {
        line-height: 1.65;
      }

      #frame-9 .meal-option-groups {
        display: grid;
        gap: 16px;
      }

      #frame-9 .meal-option-group {
        display: grid;
        gap: 10px;
      }

      #frame-9 .meal-option-group h4 {
        margin: 0;
        font-size: 1rem;
      }

      #frame-9 .meal-option-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      #frame-9 .meal-option-button {
        border: 1px solid #000;
        border-radius: 999px;
        background: #fff;
        color: #000;
        padding: 8px 12px;
        cursor: pointer;
        font: inherit;
        transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
      }

      #frame-9 .meal-option-button:hover {
        transform: translateY(-1px);
      }

      #frame-9 .meal-option-button.is-selected {
        background: #000;
        color: #fff;
      }

      #frame-9 .meal-summary-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      #frame-9 .meal-summary-item {
        border: 1px solid #000;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }

      #frame-9 .meal-summary-item span,
      #frame-9 .meal-summary-item b {
        display: block;
      }

      #frame-9 .meal-summary-item span {
        font-size: 0.82rem;
      }

      #frame-9 .meal-summary-item b {
        margin-top: 4px;
        font-size: 1rem;
      }

      #frame-9 .meal-feedback {
        margin: 0;
        border: 1px solid #000;
        border-radius: 8px;
        padding: 12px;
        line-height: 1.6;
      }

      @media (max-width: 900px) {
        #frame-9 .BodyMethodExplorer {
          grid-template-columns: 1fr;
        }

        #frame-9 .body-method-card-grid {
          grid-template-columns: 1fr;
        }

        #frame-9 .body-method-card {
          min-height: 220px;
        }

        #frame-9 .body-method-actions .button {
          width: 100%;
        }

        #frame-9 .meal-summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 420px) {
        #frame-9 .meal-summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <div class="frame-wrap BodyMethodExplorer" data-body-method-explorer>
      <p class="body-method-heading">體態管理方式入口</p>
      <div class="body-method-card-grid" data-method-card-grid></div>
      <article class="body-method-detail" data-method-detail hidden aria-live="polite">
        <h3 data-method-title></h3>
        <p data-method-subtitle>內容待補</p>
        <div class="body-method-image-placeholder" data-method-image>image placeholder</div>
        <div class="meal-box-game" data-meal-game hidden></div>
        <p data-method-copy>這裡之後會放入此方法的介紹、花費、心理壓力與身體感受。</p>
        <div class="body-method-actions">
          <button class="button" type="button" data-method-collapse>收合</button>
          <button class="button" type="button" data-method-next>下一項</button>
        </div>
      </article>
    </div>

    <script>
      (() => {
        const explorer = document.querySelector('[data-body-method-explorer]');
        if (!explorer) return;

        const methods = [
          {
            id: 'meal',
            title: '健康餐',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'gym',
            title: '健身房',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'injection',
            title: '瘦瘦針',
            description: '內容待補',
            imageLabel: 'image placeholder'
          },
          {
            id: 'fasting',
            title: '斷食',
            description: '內容待補',
            imageLabel: 'image placeholder'
          }
        ];

        let selectedMethod = null;
        const cardGrid = explorer.querySelector('[data-method-card-grid]');
        const detail = explorer.querySelector('[data-method-detail]');
        const detailTitle = explorer.querySelector('[data-method-title]');
        const detailSubtitle = explorer.querySelector('[data-method-subtitle]');
        const detailImage = explorer.querySelector('[data-method-image]');
        const detailCopy = explorer.querySelector('[data-method-copy]');
        const mealGame = explorer.querySelector('[data-meal-game]');
        const collapseButton = explorer.querySelector('[data-method-collapse]');
        const nextButton = explorer.querySelector('[data-method-next]');
        const mealOptions = {
          staple: {
            label: '主食',
            items: [
              { name: '白飯', price: 20, calories: 180, protein: 3, carbs: 40, fat: 0 },
              { name: '紫米飯', price: 25, calories: 170, protein: 4, carbs: 36, fat: 1 },
              { name: '地瓜', price: 30, calories: 150, protein: 2, carbs: 34, fat: 0 },
              { name: '生菜', price: 25, calories: 40, protein: 2, carbs: 8, fat: 0 },
              { name: '生菜加白飯', price: 35, calories: 210, protein: 5, carbs: 45, fat: 1 },
              { name: '生菜加紫米飯', price: 40, calories: 200, protein: 6, carbs: 41, fat: 2 }
            ]
          },
          protein: {
            label: '蛋白質',
            items: [
              { name: '雞胸肉', price: 60, calories: 160, protein: 30, carbs: 0, fat: 4 },
              { name: '鮭魚', price: 90, calories: 220, protein: 25, carbs: 0, fat: 14 },
              { name: '豆腐', price: 45, calories: 120, protein: 12, carbs: 4, fat: 7 },
              { name: '牛肉', price: 80, calories: 230, protein: 24, carbs: 0, fat: 15 },
              { name: '水煮蛋', price: 25, calories: 80, protein: 7, carbs: 1, fat: 5 }
            ]
          },
          side: {
            label: '配菜',
            items: [
              { name: '花椰菜', price: 25, calories: 35, protein: 3, carbs: 7, fat: 0 },
              { name: '高麗菜', price: 20, calories: 30, protein: 2, carbs: 6, fat: 0 },
              { name: '玉米筍', price: 25, calories: 28, protein: 1, carbs: 6, fat: 0 },
              { name: '菇類', price: 30, calories: 40, protein: 3, carbs: 7, fat: 0 },
              { name: '綜合蔬菜', price: 35, calories: 70, protein: 4, carbs: 13, fat: 1 }
            ]
          },
          drink: {
            label: '飲料',
            items: [
              { name: '無糖茶', price: 20, calories: 0, protein: 0, carbs: 0, fat: 0 },
              { name: '黑咖啡', price: 35, calories: 5, protein: 0, carbs: 1, fat: 0 },
              { name: '豆漿', price: 35, calories: 130, protein: 9, carbs: 12, fat: 5 },
              { name: '珍珠奶茶', price: 65, calories: 450, protein: 6, carbs: 70, fat: 12 }
            ]
          }
        };
        const mealState = {
          staple: null,
          protein: null,
          side: null,
          drink: null
        };

        function renderCards() {
          cardGrid.innerHTML = methods.map((method) => `
            <button class="body-method-card" type="button" data-method-id="${method.id}" aria-pressed="false">
              <h3>${method.title}</h3>
              <p>${method.description}</p>
              <div class="body-method-image-placeholder">${method.imageLabel}</div>
              <span class="body-method-card-cta">點擊查看</span>
            </button>
          `).join('');
        }

        function selectedMealItems() {
          return Object.values(mealState).filter(Boolean);
        }

        function mealTotals() {
          return selectedMealItems().reduce(
            (total, item) => ({
              price: total.price + item.price,
              calories: total.calories + item.calories,
              protein: total.protein + item.protein,
              carbs: total.carbs + item.carbs,
              fat: total.fat + item.fat
            }),
            { price: 0, calories: 0, protein: 0, carbs: 0, fat: 0 }
          );
        }

        function mealFeedback(calories) {
          if (calories < 400) return '這份餐點偏輕，可能不適合作為正餐。';
          if (calories <= 700) return '這份餐點較接近一般健康餐盒。';
          return '這份餐點熱量較高，可能來自飲料或高脂蛋白質。';
        }

        function renderMealGame() {
          const totals = mealTotals();
          mealGame.innerHTML = `
            <div class="meal-game-intro">
              <h3>今天你會怎麼配一盒健康餐？</h3>
              <p>選擇主食、蛋白質、蔬菜與飲料，系統會即時計算價格與營養組成。</p>
            </div>
            <div class="meal-option-groups">
              ${Object.entries(mealOptions).map(([category, group]) => `
                <section class="meal-option-group">
                  <h4>${group.label}</h4>
                  <div class="meal-option-buttons">
                    ${group.items.map((item) => `
                      <button
                        class="meal-option-button${mealState[category]?.name === item.name ? ' is-selected' : ''}"
                        type="button"
                        data-meal-category="${category}"
                        data-meal-option="${item.name}"
                      >${item.name}</button>
                    `).join('')}
                  </div>
                </section>
              `).join('')}
            </div>
            <div class="meal-summary-grid" aria-live="polite">
              <div class="meal-summary-item"><span>總價格</span><b>${totals.price} 元</b></div>
              <div class="meal-summary-item"><span>熱量</span><b>${totals.calories} kcal</b></div>
              <div class="meal-summary-item"><span>蛋白質</span><b>${totals.protein} g</b></div>
              <div class="meal-summary-item"><span>碳水</span><b>${totals.carbs} g</b></div>
              <div class="meal-summary-item"><span>脂肪</span><b>${totals.fat} g</b></div>
            </div>
            <p class="meal-feedback">${mealFeedback(totals.calories)}</p>
          `;
        }

        function selectMethod(methodId) {
          selectedMethod = methods.find((method) => method.id === methodId) || null;
          explorer.querySelectorAll('[data-method-id]').forEach((card) => {
            const isActive = card.dataset.methodId === selectedMethod?.id;
            card.classList.toggle('is-active', isActive);
            card.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          });

          if (!selectedMethod) {
            detail.hidden = true;
            return;
          }

          if (selectedMethod.id === 'meal') {
            detailTitle.hidden = true;
            detailSubtitle.hidden = true;
            detailImage.hidden = true;
            detailCopy.hidden = true;
            mealGame.hidden = false;
            renderMealGame();
          } else {
            detailTitle.hidden = false;
            detailSubtitle.hidden = false;
            detailImage.hidden = false;
            detailCopy.hidden = false;
            mealGame.hidden = true;
            detailTitle.textContent = selectedMethod.title;
            detailSubtitle.textContent = selectedMethod.description;
            detailImage.textContent = selectedMethod.imageLabel;
          }
          detail.hidden = false;
        }

        renderCards();

        cardGrid.addEventListener('click', (event) => {
          const card = event.target.closest('[data-method-id]');
          if (!card) return;
          selectMethod(card.dataset.methodId);
        });

        collapseButton.addEventListener('click', () => selectMethod(null));

        detail.addEventListener('click', (event) => {
          const optionButton = event.target.closest('[data-meal-option]');
          if (!optionButton) return;
          const category = optionButton.dataset.mealCategory;
          const optionName = optionButton.dataset.mealOption;
          const option = mealOptions[category]?.items.find((item) => item.name === optionName);
          if (!option) return;
          mealState[category] = option;
          renderMealGame();
        });

        nextButton.addEventListener('click', () => {
          const currentIndex = methods.findIndex((method) => method.id === selectedMethod?.id);
          const nextIndex = currentIndex < 0 ? 0 : (currentIndex + 1) % methods.length;
          selectMethod(methods[nextIndex].id);
        });
      })();
    </script>
  </section>

  <script src="script.js"></script>
</body>
</html>
